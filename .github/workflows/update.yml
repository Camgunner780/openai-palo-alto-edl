name: Daily OpenAI EDL Update

on:
  schedule:
    - cron: '0 4 * * *'  # Runs automatically every day at 4:00 AM UTC
  workflow_dispatch:      # Allows you to click a button to run it manually anytime

concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch and Process IP List via Text Scraper
        run: |
          echo "Downloading verified mirror text..."
          # 1. Fetch raw data
          # 2. Extract anything matching an IPv4 or IPv6 CIDR subnet block
          # 3. Use '|| true' so grep doesn't cause a pipeline error if format shifts
          curl -s -A "Mozilla/5.0" "https://githubusercontent.com" \

          | grep -oE '([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}|([0-9a-fA-F]{1,4}:){1,7}:?/[0-9]{1,3}' > openai-ips.txt || true
          
          echo "Processing complete. File contents preview:"
          cat openai-ips.txt

      - name: Commit and Push changes back to code branch
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add openai-ips.txt
          if git diff --staged --quiet; then
            echo "No changes in IP addresses detected."
          else
            git commit -m "Automated update of OpenAI IPs"
            git push
          fi

      - name: Upload text artifact for Pages hosting
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy changes to GitHub Pages live server
        uses: actions/deploy-pages@v4
