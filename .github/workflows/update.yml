name: Daily OpenAI EDL Update

on:
  schedule:
    - cron: '0 4 * * *'  # Runs automatically every day at 4:00 AM UTC
  workflow_dispatch:      # Allows you to click a button to run it manually anytime

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch and Process IP List
        run: |
          echo "Fetching IP list via curl..."
          # Fetch directly from the verified mirror and parse text lines
          curl -s -A "Mozilla/5.0" "https://githubusercontent.com" | grep -oE '[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\/[0-9]{1,2}' > openai-ips.txt
          
          echo "File processing complete. Checking output:"
          cat openai-ips.txt

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add openai-ips.txt
          if git diff --staged --quiet; then
            echo "No changes in IP addresses detected."
          else
            git commit -m "Automated update of OpenAI IPs"
            git push
          fi

