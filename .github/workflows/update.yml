name: Daily OpenAI EDL Update

on:
  schedule:
    - cron: '0 4 * * *'  # Runs automatically every day at 4:00 AM UTC
  workflow_dispatch:      # Allows you to click a button to run it manually anytime

# Prevents multiple deployments from trying to run at the exact same time
concurrency:
  group: "pages"
  cancel-in-progress: true

# Grant permissions required for both committing code changes and deploying to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch and Process IP List via JQ
        run: |
          echo "Fetching verified mirror data..."
          curl -s -A "Mozilla/5.0" "https://githubusercontent.com" | jq -r '.prefixes[].ip_prefix' > openai-ips.txt
          
          echo "Processing complete. Reviewing outputs:"
          cat openai-ips.txt

      - name: Commit and Push changes back to code branch
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add openai-ips.txt
          if git diff --staged --quiet; then
            echo "No changes in IP addresses detected."
          else
            git commit -m "Automated update of OpenAI IPs"
            git push
          fi

      - name: Upload text artifact for Pages hosting
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy changes to GitHub Pages live server
        uses: actions/deploy-pages@v4
